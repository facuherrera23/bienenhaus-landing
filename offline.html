<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sin conexión · Bienenhaus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      color: #e8e8e8;
      font-family: 'Outfit', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 28px;
      color: #20b8ab;
      opacity: .6;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 28px;
      margin-bottom: 12px;
      color: #fff;
    }
    p {
      color: #888;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: #e8e8e8;
      padding: 12px 28px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      font-family: inherit;
    }
    .retry-btn:hover {
      border-color: #20b8ab;
      background: rgba(32,184,171,0.06);
    }
  </style>
  <link rel="icon" type="image/x-icon" href="/bienenhaus-landing/images/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/bienenhaus-landing/images/favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/bienenhaus-landing/images/favicon-192x192.png"/>
  <link rel="apple-touch-icon" href="/bienenhaus-landing/images/apple-touch-icon.png"/>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>Sin conexión</h1>
    <p>Parece que no tenés internet.<br/>Revisá tu conexión y volvé a intentar.</p>
    <button class="retry-btn" id="retryBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
      Reintentar
    </button>
  </div>
<script src="/bienenhaus-landing/js/offline.min.js"></script>
</body>
</html>
