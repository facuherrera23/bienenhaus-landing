<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienenhaus Propiedades</title>
  <script>
    // SPA routing para GitHub Pages: redirigir 404 → index.html
    var segments = window.location.pathname.split('/').filter(Boolean);
    var isProperty = segments.length >= 2 && (segments[0] === 'venta' || segments[0] === 'alquiler' || segments[0] === 'propiedad');
    var isAsset = /\.(css|js|png|jpg|svg|ico|webp|json|xml)$/i.test(window.location.pathname);
    if (!isAsset) {
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <p>Redirigiendo...</p>
</body>
</html>
